# configs/mnist.yaml

dataset:
  name: "mnist"
  image_size: 28
  batch_size: 32
  num_workers: 4
  root: "./data"

model:
  in_channels: 1
  base_channels: 64
  time_emb_dim: 256

degradation:
  timesteps: 20

training:
  epochs: 200
  learning_rate: 0.00002
  output_dir: "outputs"
  save_name: "cold_diffusion_blur.pt"